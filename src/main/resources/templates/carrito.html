<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - Retro Gaming</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container my-5 flex-grow-1">
  <h2 class="text-center text-warning mb-4">Carrito de Compras</h2>

  <!-- Mensaje si está vacío -->
  <div th:if="${carrito == null || carrito.size() == 0}">
    No hay productos en el carrito.
  </div>

  <div th:if="${carrito != null && carrito.size() > 0}">
    <div class="row g-4">
      <!-- Tabla de productos -->
      <div class="col-lg-8">
        <div class="table-responsive">
          <table class="table table-dark table-bordered table-hover text-center align-middle">
            <thead class="table-warning text-dark">
            <tr>
              <th>Imagen</th>
              <th>Producto</th>
              <th>Precio</th>
              <th>Cantidad</th>
              <th>Subtotal</th>
              <th>Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, iter : ${carrito}">
              <img th:src="${item.imagen}" width="60" class="rounded">
              <td th:text="${item.nombre}"></td>
              <td th:text="'S/ ' + ${#numbers.formatDecimal(item.precio, 1, 2)}"></td>
              <td th:text="${item.cantidad}"></td>
              <td th:with="subtotal=${item.precio * item.cantidad}"
                  th:text="'S/ ' + ${#numbers.formatDecimal(subtotal, 1, 2)}"></td>
              <td>
                <a th:href="@{/carrito/eliminar/{indice}(indice=${iter.index})}"
                   class="btn btn-danger btn-sm">Eliminar</a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Resumen -->
      <div class="col-lg-4">
        <div class="card bg-secondary text-white border-warning h-100 p-4">
          <h5 class="text-warning mb-3">Resumen</h5>
          <hr class="border-warning">
          <div class="d-flex justify-content-between mb-2">
            <span>Total a pagar:</span>
            <span th:text="${#aggregates.sum(carrito.![precio.multiply(cantidad)])}"></span>
          </div>
          <hr class="border-warning">
          <div class="d-grid gap-2 mt-3">
            <a th:href="@{/boletas/nuevo}" class="btn btn-info text-dark fw-bold">Proceder al pago</a>
            <form th:action="@{/carrito/vaciar}" method="post">
              <button type="submit" class="btn btn-outline-danger w-100">Vaciar carrito</button>
            </form>
            <a th:href="@{/}" class="btn btn-outline-light">Seguir comprando</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
