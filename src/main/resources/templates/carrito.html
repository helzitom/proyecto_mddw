<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Carrito de Compras - Retro Gaming</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="bg-dark text-white">

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-5">

  <h2 class="text-center text-warning mb-4">
    Carrito de Compras
  </h2>

  <!-- 🔥 MENSAJE SI EL CARRITO ESTÁ VACÍO -->
  <div id="carrito-vacio"
       class="alert alert-warning text-center d-none">
    No hay productos en el carrito
  </div>

  <div class="row g-4">

    <!-- TABLA -->
    <div class="col-lg-8">

      <div class="table-responsive" id="tabla-carrito-container">

        <table class="table table-dark table-bordered table-hover text-center align-middle">

          <thead class="table-warning text-dark">
          <tr>
            <th>Imagen</th>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th>Acción</th>
          </tr>
          </thead>

          <!-- JS pinta aquí -->
          <tbody id="carrito-lista"></tbody>

        </table>

      </div>
    </div>

    <!-- RESUMEN -->
    <div class="col-lg-4">

      <div class="card bg-secondary text-white border-warning h-100 p-4">

        <h5 class="text-warning mb-3">
          Resumen
        </h5>

        <hr class="border-warning">

        <div class="d-flex justify-content-between mb-2">
          <span>Total a pagar:</span>

          <span id="total"
                class="fw-bold text-warning">
            S/ 0.00
          </span>
        </div>

        <hr class="border-warning">

        <div class="d-grid gap-2 mt-3">

          <!-- GENERAR BOLETA -->
          <button type="button"
                  class="btn btn-info text-dark fw-bold"
                  onclick="generarBoleta()">

            Generar boleta
          </button>

          <!-- VACIAR -->
          <button type="button"
                  class="btn btn-outline-danger"
                  onclick="vaciarCarrito()">

            Vaciar carrito
          </button>

          <!-- VOLVER -->
          <a th:href="@{/}"
             class="btn btn-outline-light">

            Seguir comprando
          </a>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/carrito.js}"></script>

</body>
</html>
