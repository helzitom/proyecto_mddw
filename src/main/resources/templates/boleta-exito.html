<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso - Retro Gaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px #00e1ff44, 0 0 40px #00e1ff22; }
            50%       { box-shadow: 0 0 40px #00e1ffaa, 0 0 80px #00e1ff44; }
        }
        @keyframes scanline {
            0%   { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes checkPop {
            0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
            70%  { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes pixelBlink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        body { background: #0a0a0f; }

        .scanline-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent, transparent 2px,
                rgba(0,225,255,0.015) 2px, rgba(0,225,255,0.015) 4px
            );
        }
        .scanline-beam {
            position: fixed; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, #00e1ff33, transparent);
            animation: scanline 4s linear infinite;
            pointer-events: none; z-index: 1;
        }

        .boleta-card {
            border: 2px solid #00e1ff !important;
            background: #0d0d1a !important;
            animation: glowPulse 3s ease-in-out infinite, fadeInUp 0.6s ease both;
            border-radius: 4px;
            position: relative; z-index: 2;
        }

        .success-icon {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg, #00e1ff22, #00ff8844);
            border: 3px solid #00ff88;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; margin: 0 auto 0.75rem;
            animation: checkPop 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
            box-shadow: 0 0 30px #00ff8866;
        }

        .boleta-numero {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem; color: #00e1ff; letter-spacing: 2px;
            background: #00e1ff11; border: 1px solid #00e1ff33;
            padding: 3px 10px; border-radius: 2px; display: inline-block;
        }

        .divider-pixel {
            height: 2px;
            background: repeating-linear-gradient(
                90deg, #00e1ff 0px, #00e1ff 6px, transparent 6px, transparent 10px
            );
            margin: 1rem 0; opacity: 0.35;
        }

        .table-boleta thead th {
            color: #00e1ff;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem; letter-spacing: 1px;
            border-color: #00e1ff33 !important;
            background: #00e1ff08;
        }
        .table-boleta td { border-color: #ffffff0d !important; color: #ccc; }

        .total-box {
            background: linear-gradient(135deg, #00e1ff0a, #00ff880a);
            border: 1px solid #ffc10733;
            border-radius: 4px; padding: 10px 16px;
        }

        .metodo-badge {
            font-family: 'Courier New', monospace; font-size: 0.75rem;
            letter-spacing: 1px; padding: 3px 10px; border-radius: 2px;
            background: #ffc10722; border: 1px solid #ffc10744; color: #ffc107;
        }

        .btn-volver {
            background: transparent; border: 2px solid #ffc107;
            color: #ffc107; font-family: 'Courier New', monospace;
            letter-spacing: 2px; font-size: 0.82rem; border-radius: 2px;
            transition: all 0.2s;
        }
        .btn-volver:hover {
            background: #ffc107; color: #000;
            box-shadow: 0 0 20px #ffc10766;
        }

        .pixel-blink { animation: pixelBlink 1s step-end infinite; color: #ffc107; }
        .info-label  { color: #666; font-family: 'Courier New', monospace; font-size: 0.75rem; letter-spacing: 1px; }
    </style>
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

<div class="scanline-overlay"></div>
<div class="scanline-beam"></div>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container my-5 flex-grow-1">
    <div class="card boleta-card p-4 mx-auto" style="max-width: 700px;">

        <!-- Encabezado -->
        <div class="text-center mb-3">
            <div class="success-icon">✓</div>
            <h3 class="text-info fw-bold mb-1">¡Pago Exitoso!</h3>
            <p class="mb-1">Gracias por tu compra, <strong th:text="${boleta.clienteNombre}"></strong>.</p>
            <span class="boleta-numero" th:text="'Boleta N° ' + ${boleta.numero}"></span>
            <br>
            <span class="info-label mt-2 d-inline-block"
                  th:text="${#temporals.format(boleta.fecha, 'dd/MM/yyyy HH:mm')}"></span>
        </div>

        <div class="divider-pixel"></div>

        <!-- Tabla de productos -->
        <div class="table-responsive">
            <table class="table table-dark table-bordered table-hover text-center align-middle table-boleta mb-0">
                <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="detalle : ${boleta.detalles}">
                    <td th:text="${detalle.nombreProducto}"></td>
                    <td th:text="'S/ ' + ${#numbers.formatDecimal(detalle.precioUnitario, 1, 2)}"></td>
                    <td th:text="${detalle.cantidad}"></td>
                    <td th:text="'S/ ' + ${#numbers.formatDecimal(detalle.subtotal, 1, 2)}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="divider-pixel"></div>

        <!-- Total y método de pago + botón -->
        <div class="total-box d-flex justify-content-between align-items-center mb-3">
            <div>
                <span class="info-label d-block mb-1">MÉTODO DE PAGO</span>
                <span class="metodo-badge" th:text="${boleta.metodoPago}"></span>
            </div>
            <div class="text-end">
                <span class="info-label d-block mb-1">TOTAL PAGADO</span>
                <span class="fw-bold text-warning fs-5">
                    S/ <span th:text="${#numbers.formatDecimal(boleta.total, 1, 2)}"></span>
                </span>
            </div>
        </div>

        <div class="text-center">
            <a th:href="@{/}" class="btn btn-volver px-4 py-2">
                <span class="pixel-blink me-1">█</span> VOLVER AL INICIO
            </a>
        </div>

    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
