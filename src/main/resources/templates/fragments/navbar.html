<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-black">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/img/logo.png}" height="50" alt="Retro Gaming">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/roms}">ROMs</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/emuladores}">Emuladores</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/consolas}">Consolas</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/carrito}">Carrito</a></li>
                <li class="nav-item" th:if="${session.usuarioLogueado == null}">
                    <a class="nav-link" th:href="@{/acceso}">Acceso</a>
                </li>
                <li class="nav-item" th:if="${session.usuarioLogueado != null}">
                    <span class="nav-link text-warning" th:text="'Bienvenido, ' + ${session.usuarioLogueado.usuario}"></span>
                </li>
                <li class="nav-item" th:if="${session.usuarioLogueado != null}">
                    <a class="nav-link" th:href="@{/logout}">Salir</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</html>
