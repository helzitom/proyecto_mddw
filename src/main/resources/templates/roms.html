<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROMs - Retro Gaming</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100">

<div th:replace="fragments/navbar :: navbar"></div>

<main class="container my-5 flex-grow-1">

  <h2 class="text-center text-warning mb-5">
    ROMs Disponibles
  </h2>

  <div class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-3">

    <div class="col" th:each="juego : ${productos}">

      <div class="card bg-secondary text-white h-100">

        <img th:src="@{${juego.imagen}}"
             class="card-img-top juego-img"
             th:alt="${juego.nombre}">

        <div class="card-body text-center p-2">

          <p class="card-text fw-bold small"
             th:text="${juego.nombre}">
          </p>

          <p class="card-text small"
             th:text="'S/ ' + ${#numbers.formatDecimal(juego.precio,1,2)}">
          </p>

          <form th:action="@{/carrito/agregar}"
                method="post">

            <input type="hidden"
                   name="nombre"
                   th:value="${juego.nombre}">

            <input type="hidden"
                   name="precio"
                   th:value="${juego.precio}">

            <input type="hidden"
                   name="imagen"
                   th:value="${juego.imagen}">

            <button type="submit"
                    class="btn btn-warning btn-sm w-100">

              Agregar al carrito

            </button>
          </form>

        </div>

      </div>

    </div>

  </div>

</main>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
