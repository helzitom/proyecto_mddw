<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2 class="text-warning mb-0">Gestión de Productos</h2>

        <a th:href="@{/admin}"
           class="btn btn-outline-light btn-sm">
            ← Volver al panel admin
        </a>

    </div>

    <!-- FORMULARIO -->
    <div class="card bg-secondary text-white p-3 mb-4">

        <form th:action="@{/productos/guardar}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" name="id" th:value="${producto.id}">

            <div class="row g-2">

                <!-- NOMBRE -->
                <div class="col-md-3">
                    <input type="text"
                           name="nombre"
                           class="form-control"
                           placeholder="Nombre"
                           th:value="${producto.nombre}"
                           required>
                </div>

                <!-- TIPO -->
                <div class="col-md-2">
                    <select name="tipo" class="form-select" required>

                        <option value="">Tipo</option>

                        <option value="ROM" th:selected="${producto.tipo == 'ROM'}">ROM</option>
                        <option value="EMULADOR" th:selected="${producto.tipo == 'EMULADOR'}">EMULADOR</option>
                        <option value="CONSOLA" th:selected="${producto.tipo == 'CONSOLA'}">CONSOLA</option>

                    </select>
                </div>

                <!-- PRECIO -->
                <div class="col-md-2">
                    <input type="number"
                           step="0.01"
                           name="precio"
                           class="form-control"
                           placeholder="Precio"
                           th:value="${producto.precio}"
                           required>
                </div>

                <!-- STOCK ✔ AÑADIDO -->
                <div class="col-md-2">
                    <input type="number"
                           name="stock"
                           class="form-control"
                           placeholder="Stock"
                           min="0"
                           th:value="${producto.stock}">
                </div>

                <!-- IMAGEN -->
                <div class="col-md-2">
                    <input type="file"
                           name="imagen"
                           class="form-control"
                           accept="image/*">
                </div>

                <!-- BOTÓN -->
                <div class="col-md-1">
                    <button class="btn btn-warning w-100">
                        Guardar
                    </button>
                </div>

            </div>

        </form>

        <!-- ERROR PRECIO -->
        <div th:if="${param.error == 'precio'}"
             class="alert alert-danger mt-3">
            El precio debe ser mayor a 0
        </div>

    </div>

    <!-- LISTA -->
    <table class="table table-dark table-bordered align-middle">

        <thead class="table-warning text-dark">
        <tr>
            <th>ID</th>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="p : ${productos}">

            <td th:text="${p.id}"></td>

            <!-- IMAGEN -->
            <td>
                <img th:src="@{/producto/imagen/{id}(id=${p.id})}"
                     width="70"
                     height="70"
                     class="img-thumbnail bg-dark">
            </td>

            <td th:text="${p.nombre}"></td>
            <td th:text="${p.tipo}"></td>
            <td th:text="${p.precio}"></td>

            <!-- STOCK -->
            <td th:text="${p.stock}"></td>

            <td>

                <a th:href="@{/productos/editar/{id}(id=${p.id})}"
                   class="btn btn-info btn-sm">
                    Editar
                </a>

                <a th:href="@{/productos/eliminar/{id}(id=${p.id})}"
                   class="btn btn-danger btn-sm">
                    Eliminar
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
