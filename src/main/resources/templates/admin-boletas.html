<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Boletas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 15px #00e1ff33; }
            50%       { box-shadow: 0 0 30px #00e1ff66; }
        }
        .admin-card {
            border: 2px solid #00e1ff;
            background: #0d0d1a;
            animation: glowPulse 3s ease-in-out infinite;
            border-radius: 4px;
        }
        .table-admin thead th {
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            letter-spacing: 1px;
            border-color: #ffc10766 !important;
        }
        .table-admin td {
            border-color: #ffffff0d !important;
            color: #ccc;
            font-size: 0.88rem;
            vertical-align: middle;
        }
        .boleta-num {
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            color: #00e1ff;
            background: #00e1ff11;
            border: 1px solid #00e1ff33;
            padding: 2px 8px;
            border-radius: 2px;
        }
        .btn-ver {
            border: 1px solid #00e1ff; color: #00e1ff;
            background: transparent; font-size: 0.78rem;
            border-radius: 2px; padding: 2px 10px;
            transition: all 0.2s;
        }
        .btn-ver:hover { background: #00e1ff; color: #000; }
        .btn-del {
            border: 1px solid #ff4466; color: #ff4466;
            background: transparent; font-size: 0.78rem;
            border-radius: 2px; padding: 2px 10px;
            transition: all 0.2s;
        }
        .btn-del:hover { background: #ff4466; color: #fff; }
        .badge-metodo {
            font-family: 'Courier New', monospace; font-size: 0.72rem;
            padding: 2px 8px; border-radius: 2px;
            background: #ffc10722; border: 1px solid #ffc10744; color: #ffc107;
        }
    </style>
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container my-5 flex-grow-1">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="text-warning mb-0 fw-bold">Gestión de Boletas</h2>
            <small class="text-secondary" style="font-family:'Courier New',monospace;letter-spacing:1px;">
                ► PANEL ADMINISTRADOR
            </small>
        </div>
        <a th:href="@{/admin}" class="btn btn-outline-light btn-sm">← Volver al panel</a>
    </div>

    <!-- Sin boletas -->
    <div th:if="${#lists.isEmpty(boletas)}" class="alert alert-warning text-center">
        No hay boletas registradas aún.
    </div>

    <!-- Tabla -->
    <div th:unless="${#lists.isEmpty(boletas)}" class="admin-card p-3">
        <div class="table-responsive">
            <table class="table table-dark table-hover table-admin mb-0">
                <thead class="table-warning text-dark">
                <tr>
                    <th>ID</th>
                    <th>N° BOLETA</th>
                    <th>CLIENTE</th>
                    <th>DNI</th>
                    <th>MÉTODO</th>
                    <th>FECHA</th>
                    <th>TOTAL</th>
                    <th>ACCIONES</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${boletas}">
                    <td th:text="${b.id}"></td>
                    <td><span class="boleta-num" th:text="${b.numero}"></span></td>
                    <td th:text="${b.clienteNombre}"></td>
                    <td th:text="${b.clienteDni}"></td>
                    <td><span class="badge-metodo" th:text="${b.metodoPago}"></span></td>
                    <td th:text="${#temporals.format(b.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="text-warning fw-bold"
                        th:text="'S/ ' + ${#numbers.formatDecimal(b.total, 1, 2)}"></td>
                    <td>
                        <!-- Eliminar — apunta a /boletas/eliminar/{id} según tu BoletaController -->
                        <a th:href="@{/boletas/eliminar/{id}(id=${b.id})}"
                           class="btn btn-del"
                           onclick="return confirm('¿Eliminar esta boleta?')">
                            Eliminar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
