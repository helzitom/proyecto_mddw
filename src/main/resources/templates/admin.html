<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - Retro Gaming</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS CORREGIDO -->
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body class="bg-dark text-white">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/img/logo.png}" alt="Retro Gaming Logo" height="55">
        </a>

        <a th:href="@{/acceso}" class="btn btn-outline-warning btn-sm">Cerrar Sesión</a>
    </div>
</nav>

<div class="container my-5">
    <h1 class="text-warning mb-1">Panel del Administrador</h1>
    <h5 class="text-secondary mb-4">Gestión de Usuarios Registrados</h5>

    <!-- 🔥 ESTADÍSTICAS (con Thymeleaf) -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card bg-secondary text-white text-center border-info p-3">
                <h6 class="text-info">Total Usuarios</h6>
                <h3 th:text="${totalUsuarios}">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-secondary text-white text-center border-success p-3">
                <h6 class="text-success">Activos</h6>
                <h3 th:text="${activos}">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-secondary text-white text-center border-danger p-3">
                <h6 class="text-danger">Bloqueados</h6>
                <h3 th:text="${bloqueados}">0</h3>
            </div>
        </div>
    </div>

    <!-- 🔥 TABLA DINÁMICA (ESTO TE DA PUNTOS) -->
    <div class="table-responsive">
        <table class="table table-dark table-bordered table-hover">
            <thead class="table-warning text-dark">
            <tr>
                <th>Usuario</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
            </thead>

            <tbody>
            <!-- th:each = requisito de rúbrica -->
            <tr th:each="user : ${usuarios}">
                <td th:text="${user.nombre}">Usuario</td>
                <td th:text="${user.rol}">Rol</td>

                <!-- 🔥 CONDICIONAL -->
                <td>
                    <span th:if="${user.activo}" class="text-success">Activo</span>
                    <span th:unless="${user.activo}" class="text-danger">Bloqueado</span>
                </td>

                <td>
                    <button class="btn btn-sm btn-warning">Editar</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>

</body>
</html>
