<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Retro Gaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100 justify-content-center align-items-center">

<img th:src="@{/img/logo.png}" alt="Logo" class="mb-4" height="100">

<div class="container" style="max-width: 420px;">
    <div class="card bg-secondary text-white border-warning">
        <div class="card-header text-center border-warning">
            <h4 class="mb-0">Iniciar Sesión</h4>
        </div>
        <div class="card-body">
            <!-- Mensaje de error -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <!-- Mensaje de éxito (después de registro) -->
            <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${mensaje}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="user" class="form-label">Usuario:</label>
                    <input type="text" id="user" name="user" class="form-control bg-dark text-white border-warning" required>
                </div>
                <div class="mb-3">
                    <label for="pass" class="form-label">Contraseña:</label>
                    <input type="password" id="pass" name="pass" class="form-control bg-dark text-white border-warning" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <a th:href="@{/recuperar}" class="text-warning small">¿Olvidaste tu contraseña?</a>
                    <a th:href="@{/registro}" class="text-info small">Regístrate</a>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning">Ingresar</button>
                    <button type="reset" class="btn btn-outline-light">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
