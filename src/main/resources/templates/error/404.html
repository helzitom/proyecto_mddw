<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Error</title>
    <link th:href="@{/css/estilos.css}" rel="stylesheet">
    <!-- Bootstrap (si no lo tienes global) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

<!-- Navbar con fragmento -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Contenido principal -->
<main class="container text-center my-auto py-5">
    <div class="card bg-secondary text-white border-warning mx-auto" style="max-width: 600px;">
        <div class="card-body p-5">
            <h1 class="display-1 text-warning" th:text="${statusCode}">404</h1>
            <h2 th:text="${pageTitle}" class="mb-3">Página no encontrada</h2>
            <p class="lead" th:text="${mensajeAmigable}">Mensaje amigable</p>

            <!-- Solo en desarrollo puedes mostrar detalles -->
            <div th:if="${exception}" class="text-start mt-4 p-3 bg-dark rounded">
                <small class="text-danger" th:text="${exception}"></small>
            </div>

            <a th:href="@{/}" class="btn btn-warning btn-lg mt-4">
                <i class="bi bi-house-door"></i> Volver al inicio
            </a>
        </div>
    </div>
</main>

<!-- Footer con fragmento -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
