<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Compra - Retro Gaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        .boleta-card { border: 2px solid #00e1ff; box-shadow: 0 0 25px #00e1ff44; }
    </style>
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container my-5 flex-grow-1">
    <div th:if="${#lists.isEmpty(carrito)}" class="alert alert-warning text-center">
        No tienes productos en el carrito. <a th:href="@{/}" class="alert-link">Ir de compras</a>
    </div>

    <div th:unless="${#lists.isEmpty(carrito)}">
        <div class="row g-4">
            <!-- Detalle de la compra -->
            <div class="col-lg-7">
                <div class="card bg-black text-white boleta-card p-4 h-100">
                    <h5 class="text-info mb-3">Detalle de la compra</h5>
                    <div class="table-responsive">
                        <table class="table table-dark table-bordered table-hover text-center align-middle">
                            <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th>Cantidad</th>
                                <th>Subtotal</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${carrito}">
                                <td th:text="${item.nombre}"></td>
                                <td th:text="'S/ ' + ${#numbers.formatDecimal(item.precio, 1, 2)}"></td>
                                <td th:text="${item.cantidad}"></td>
                                <td th:with="subtotal=${item.precio * item.cantidad}"
                                    th:text="'S/ ' + ${#numbers.formatDecimal(subtotal, 1, 2)}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <h5 class="text-warning mt-3">
                        Total a pagar:
                        <span class="fw-bold"
                              th:text="'S/ ' + ${#numbers.formatDecimal(total, 1, 2)}">0.00</span>
                    </h5>
                </div>
            </div>

            <!-- Formulario de datos del cliente -->
            <div class="col-lg-5">
                <div class="card bg-black text-white boleta-card p-4 h-100">
                    <h5 class="text-info mb-3">Datos del cliente</h5>
                    <form th:action="@{/boletas/guardar}" method="post" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre completo:</label>
                            <input type="text" name="nombre" class="form-control bg-dark text-white border-info" required>
                            <div class="invalid-feedback">Ingresa tu nombre completo.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">DNI:</label>
                            <input type="text" name="dni" class="form-control bg-dark text-white border-info"
                                   maxlength="8" pattern="\d{8}" required>
                            <div class="invalid-feedback">Ingresa un DNI válido (8 dígitos).</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Método de pago:</label>
                            <select name="metodo" class="form-select bg-dark text-white border-info" required>
                                <option value="">Seleccionar</option>
                                <option value="Tarjeta">Tarjeta</option>
                                <option value="Yape">Yape</option>
                                <option value="Plin">Plin</option>
                            </select>
                            <div class="invalid-feedback">Selecciona un método de pago.</div>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-info text-dark fw-bold">Confirmar Pago</button>
                            <a th:href="@{/carrito}" class="btn btn-outline-light">Volver al carrito</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
