<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Retro Gaming</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100 justify-content-center align-items-center py-5">

<div class="container" style="max-width: 480px;">

    <div class="card bg-secondary text-white border-warning">

        <div class="card-header text-center border-warning">
            <h4 class="mb-0">Crear cuenta</h4>
        </div>

        <div class="card-body">

            <!-- MENSAJES GLOBALES -->
            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${mensaje}" class="alert alert-success">
                <span th:text="${mensaje}"></span>
            </div>

            <!-- FORMULARIO -->
            <form th:action="@{/registro}" th:object="${registroDTO}" method="post">

                <!-- USUARIO -->
                <div class="mb-2">
                    <label class="form-label">Usuario:</label>
                    <input type="text"
                           th:field="*{usuario}"
                           class="form-control bg-dark text-white border-warning">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('usuario')}"
                         th:errors="*{usuario}">
                    </div>
                </div>

                <!-- CORREO -->
                <div class="mb-2">
                    <label class="form-label">Correo electrónico:</label>
                    <input type="email"
                           th:field="*{correo}"
                           class="form-control bg-dark text-white border-warning">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('correo')}"
                         th:errors="*{correo}">
                    </div>
                </div>

                <!-- PASSWORD -->
                <div class="mb-2">
                    <label class="form-label">Contraseña:</label>
                    <input type="password"
                           th:field="*{password}"
                           class="form-control bg-dark text-white border-warning">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}">
                    </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="mb-2">
                    <label class="form-label">Confirmar contraseña:</label>
                    <input type="password"
                           th:field="*{confirmPassword}"
                           class="form-control bg-dark text-white border-warning">

                </div>

                <!-- ROL -->
                <div class="mb-2">
                    <label class="form-label">Tipo de rol:</label>

                    <select th:field="*{rol}"
                            class="form-select bg-dark text-white border-warning">

                        <option value="">Seleccione</option>
                        <option value="USER">Usuario</option>
                        <option value="ADMIN">Administrador</option>

                    </select>

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('rol')}"
                         th:errors="*{rol}">
                    </div>
                </div>

                <!-- TERMS -->
                <div class="mb-3 form-check">
                    <input type="checkbox"
                           class="form-check-input border-warning"
                           required>

                    <label class="form-check-label">
                        Acepto los términos y condiciones
                    </label>
                </div>

                <!-- BOTÓN -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-warning">
                        Registrarse
                    </button>
                </div>

                <p class="text-center mt-3">
                    ¿Ya tienes una cuenta?
                    <a th:href="@{/acceso}" class="text-warning">
                        Inicia sesión
                    </a>
                </p>

                <div class="text-center">
                    <img th:src="@{/img/pacman.gif}" width="100">
                </div>

            </form>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
