<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Retro Gaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100 justify-content-center align-items-center py-5">

<div class="container" style="max-width: 480px;">
    <div class="card bg-secondary text-white border-warning">
        <div class="card-header text-center border-warning">
            <h4 class="mb-0">Crear cuenta</h4>
        </div>

        <div class="card-body">

            <div th:if="${mensaje}" class="alert alert-success">
                <span th:text="${mensaje}"></span>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/registro}" method="post">

                <div class="mb-3">
                    <label class="form-label">Usuario:</label>
                    <input type="text" name="usuario" class="form-control bg-dark text-white border-warning" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo electrónico:</label>
                    <input type="email" name="correo" class="form-control bg-dark text-white border-warning" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña:</label>
                    <input type="password" name="password" class="form-control bg-dark text-white border-warning" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirmar contraseña:</label>
                    <input type="password" name="password2" class="form-control bg-dark text-white border-warning" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo de rol:</label>
                    <select name="rol" class="form-select bg-dark text-white border-warning" required>
                        <option value="">Seleccione</option>
                        <option value="usuario">Usuario</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" name="terms" class="form-check-input border-warning" required>
                    <label class="form-check-label">Acepto los términos y condiciones</label>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-warning">Registrarse</button>
                </div>

                <p class="text-center mt-3">
                    ¿Ya tienes una cuenta? <a th:href="@{/acceso}" class="text-warning">Inicia sesión</a>
                </p>

                <div class="text-center">
                    <img th:src="@{/img/pacman.gif}" width="100">
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/registro.js}"></script>
</body>
</html>
