<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - Retro Gaming</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100 justify-content-center align-items-center">

<div class="container" style="max-width: 420px;">
  <div class="card bg-secondary text-white border-warning">
    <div class="card-header text-center border-warning">
      <h4 class="mb-0">Recuperar Contraseña</h4>
    </div>
    <div class="card-body">
      <div th:if="${mensaje}" class="alert alert-success"><span th:text="${mensaje}"></span></div>
      <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>

      <form th:action="@{/recuperar}" method="post">
        <div class="mb-3">
          <label class="form-label">Usuario:</label>
          <input type="text" name="usuario" class="form-control bg-dark text-white border-warning" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Nueva Contraseña:</label>
          <input type="password" name="password" class="form-control bg-dark text-white border-warning" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar contraseña:</label>
          <input type="password" name="confirm" class="form-control bg-dark text-white border-warning" required>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-warning">Modificar</button>
          <a th:href="@{/acceso}" class="btn btn-outline-light">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
