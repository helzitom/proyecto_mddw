<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Gaming</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="bg-dark text-white">

<div th:replace="fragments/navbar :: navbar"></div>

<main>

    <!-- CARRUSEL -->
    <div id="carrusel-inicio" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carrusel-inicio" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#carrusel-inicio" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#carrusel-inicio" data-bs-slide-to="2"></button>
            <button type="button" data-bs-target="#carrusel-inicio" data-bs-slide-to="3"></button>
        </div>

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img th:src="@{/img/Crash Nitro.webp}" class="d-block w-100" style="height:400px; object-fit:cover;">
            </div>

            <div class="carousel-item">
                <img th:src="@{/img/mario.webp}" class="d-block w-100" style="height:400px; object-fit:cover;">
            </div>

            <div class="carousel-item">
                <img th:src="@{/img/Doom 2.webp}" class="d-block w-100" style="height:400px; object-fit:cover;">
            </div>

            <div class="carousel-item">
                <img th:src="@{/img/Zelda A link.webp}" class="d-block w-100" style="height:400px; object-fit:cover;">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carrusel-inicio" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carrusel-inicio" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <!-- INTRO -->
    <section class="container my-5 text-center">
        <h2 class="display-4 fw-bold text-warning">EL RETRO GAMING</h2>
        <h2 class="display-4 fw-bold text-warning">NUNCA FUE TAN FÁCIL</h2>
        <p class="lead mt-3">
            Descubre ROMs, emuladores y consolas clásicas en un solo lugar.
        </p>
    </section>

    <!-- CARDS -->
    <section class="container my-5">
        <div class="row g-4">

            <div class="col-md-4">
                <a th:href="@{/roms}" class="text-decoration-none">
                    <div class="card bg-secondary text-white h-100 border-warning text-center">
                        <div class="card-body">
                            <h3>🎮 ROMs</h3>
                            <p>Revive juegos clásicos</p>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a th:href="@{/emuladores}" class="text-decoration-none">
                    <div class="card bg-secondary text-white h-100 border-warning text-center">
                        <div class="card-body">
                            <h3>💻 Emuladores</h3>
                            <p>Juega en cualquier dispositivo</p>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a th:href="@{/consolas}" class="text-decoration-none">
                    <div class="card bg-secondary text-white h-100 border-warning text-center">
                        <div class="card-body">
                            <h3>🕹️ Consolas</h3>
                            <p>Explora plataformas retro</p>
                        </div>
                    </div>
                </a>
            </div>

        </div>
    </section>

    <!-- TOP JUEGOS -->
    <section class="container my-5">
        <h2 class="text-center text-warning mb-4">Top Juegos Retro</h2>

        <div class="row g-3 justify-content-center">

            <div class="col-6 col-md-3">
                <img th:src="@{/img/Crash Nitro.webp}" class="img-fluid rounded">
            </div>

            <div class="col-6 col-md-3">
                <img th:src="@{/img/mario.webp}" class="img-fluid rounded">
            </div>

            <div class="col-6 col-md-3">
                <img th:src="@{/img/Doom 2.webp}" class="img-fluid rounded">
            </div>

            <div class="col-6 col-md-3">
                <img th:src="@{/img/Zelda A link.webp}" class="img-fluid rounded">
            </div>

        </div>
    </section>

</main>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>

</body>
</html>
