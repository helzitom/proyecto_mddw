<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Boleta de Compra - RetroGaming Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">

    <style>
        body {
            background: #0a0a0a;
        }

        .boleta-card {
            border: 2px solid #00e1ff;
            box-shadow: 0 0 25px #00e1ff44;
        }

        .table thead th {
            background: #00e1ff;
            color: #000;
        }
    </style>
</head>

<body class="bg-dark text-white py-5">

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <!-- HEADER -->
    <div class="card bg-black text-white boleta-card p-4 mb-4">

        <div class="row align-items-center">

            <div class="col-auto">
                <img th:src="@{/img/logo.png}"
                     alt="Logo"
                     height="70">
            </div>

            <div class="col">
                <h3 class="mb-0">RetroGaming Store</h3>

                <p id="boleta-numero"
                   class="mb-0 text-info fw-bold">
                </p>

                <p id="boleta-fecha"
                   class="mb-0 text-secondary small">
                </p>
            </div>

        </div>

    </div>

    <div class="row g-4">

        <!-- DETALLE -->
        <div class="col-lg-7">

            <div class="card bg-black text-white boleta-card p-4 h-100">

                <h5 class="text-info mb-3">
                    Detalle de la compra
                </h5>

                <!-- MENSAJE -->
                <div id="boleta-vacia"
                     class="alert alert-warning text-center d-none">

                    No hay productos en la boleta
                </div>

                <!-- TABLA -->
                <div class="table-responsive"
                     id="tabla-boleta-container">

                    <table class="table table-dark table-bordered table-hover text-center align-middle">

                        <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                        </tr>
                        </thead>

                        <tbody id="boleta-body"></tbody>

                    </table>

                </div>

                <!-- TOTAL -->
                <h5 class="text-warning mt-3">

                    Total a pagar:

                    <span id="boleta-total"
                          class="fw-bold">
                        S/ 0.00
                    </span>

                </h5>

            </div>

        </div>

        <!-- FORMULARIO -->
        <div class="col-lg-5">

            <div class="card bg-black text-white boleta-card p-4 h-100">

                <h5 class="text-info mb-3">
                    Datos del cliente
                </h5>

                <form th:object="${cliente}"
                      th:action="@{/pago}"
                      method="post"
                      id="form-pago"
                      class="needs-validation"
                      novalidate>

                    <div class="row g-3">

                        <!-- NOMBRE -->
                        <div class="col-12">

                            <label class="form-label fw-semibold">
                                Nombre completo:
                            </label>

                            <input type="text"
                                   th:field="*{nombre}"
                                   id="cliente-nombre"
                                   class="form-control bg-dark text-white border-info"
                                   required>

                            <div class="invalid-feedback">
                                Ingresa tu nombre completo
                            </div>

                        </div>

                        <!-- DNI -->
                        <div class="col-12">

                            <label class="form-label fw-semibold">
                                DNI:
                            </label>

                            <input type="text"
                                   th:field="*{dni}"
                                   id="cliente-dni"
                                   maxlength="8"
                                   class="form-control bg-dark text-white border-info"
                                   required>

                            <div class="invalid-feedback">
                                Ingresa tu DNI
                            </div>

                        </div>

                        <!-- MÉTODO -->
                        <div class="col-12">

                            <label class="form-label fw-semibold">
                                Método de pago:
                            </label>

                            <select th:field="*{metodo}"
                                    id="metodo"
                                    class="form-select bg-dark text-white border-info"
                                    required>

                                <option value="">
                                    Seleccionar
                                </option>

                                <option value="Tarjeta">
                                    Tarjeta
                                </option>

                                <option value="Yape">
                                    Yape
                                </option>

                                <option value="Plin">
                                    Plin
                                </option>

                            </select>

                            <div class="invalid-feedback">
                                Selecciona un método de pago
                            </div>

                        </div>

                        <!-- EXTRA -->
                        <div id="extra-pago"></div>

                    </div>

                    <!-- BOTONES -->
                    <div class="d-grid gap-2 mt-4">

                        <button type="button"
                                onclick="confirmarPago()"
                                class="btn btn-info text-dark fw-bold">

                            Confirmar Pago
                        </button>

                        <a th:href="@{/}"
                           class="btn btn-outline-light">

                            Cancelar Pago
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade"
     id="modal-pago-exitoso"
     tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content bg-dark text-white border-info">

            <div class="modal-header border-info">

                <h5 class="modal-title text-info">
                    Pago Exitoso
                </h5>

            </div>

            <div class="modal-body"
                 id="modal-pago-cuerpo">
            </div>

            <div class="modal-footer border-info">

                <a th:href="@{/}"
                   class="btn btn-warning w-100">

                    Volver al inicio
                </a>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/boleta.js}"></script>

</body>
</html>
